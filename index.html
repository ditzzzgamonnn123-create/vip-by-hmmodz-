<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXATA CRASH V6</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: #000; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        #particles-js { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle at center, #0a1a0a 0%, #000 100%); z-index: 1; }
        
        .login-card { position: relative; z-index: 10; width: 90%; max-width: 400px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 40px; padding: 40px 30px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .title { font-size: 26px; font-weight: 600; color: #fff; letter-spacing: -0.5px; margin-bottom: 5px; }
        .subtitle { color: rgba(255, 255, 255, 0.5); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 30px; }
        .input-group { margin-bottom: 15px; }
        .input-group input { width: 100%; background: rgba(255, 255, 255, 0.08); border: none; padding: 18px 20px; border-radius: 18px; color: #fff; font-size: 16px; outline: none; transition: 0.3s; }
        .input-group input:focus { background: rgba(255, 255, 255, 0.15); box-shadow: 0 0 0 2px rgba(0, 255, 0, 0.5); }
        .btn-signin { width: 100%; background: #fff; color: #000; padding: 16px; border-radius: 18px; border: none; font-size: 17px; font-weight: 600; margin-top: 10px; cursor: pointer; transition: 0.3s; }
        .btn-signin:active { transform: scale(0.96); opacity: 0.8; }
        .buy-access { display: block; margin-top: 25px; color: #34c759; text-decoration: none; font-size: 15px; font-weight: 500; cursor: pointer; }
        
        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 30px; }
        .social-btn { background: rgba(255, 255, 255, 0.05); padding: 12px; border-radius: 14px; color: #fff; font-size: 12px; text-decoration: none; border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.3s; text-align: center;}

        .ios-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 100; display: none; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .ios-dialog { width: 270px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border-radius: 14px; text-align: center; overflow: hidden; animation: zoomIn 0.2s ease-out; }
        .ios-content { padding: 20px; }
        .ios-title { font-weight: 600; font-size: 17px; color: #000; margin-bottom: 5px; }
        .ios-msg { font-size: 13px; color: #000; }
        .ios-btn { width: 100%; padding: 12px; border: none; border-top: 0.5px solid rgba(0,0,0,0.1); background: transparent; color: #007aff; font-size: 17px; font-weight: 600; cursor: pointer; }
        .ios-btn:active { background: rgba(0,0,0,0.05); }

        @keyframes zoomIn { from { opacity: 0; transform: scale(1.2); } to { opacity: 1; transform: scale(1); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="login-card">
        <div class="logo-area">
            <h1 class="title">XETA AXATA V6</h1>
            <p class="subtitle">Premium Access</p>
        </div>
        <div class="input-group">
            <input type="text" id="username" placeholder="Username" autocomplete="off">
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Password">
        </div>
        <button class="btn-signin" onclick="handleLogin()">Sign In</button>
        <div class="buy-access" onclick="buyAccess()">Upgrade to VIP Access 🔓</div>
        <div class="social-grid">
            <a href="https://t.me/DevNeversXenter" class="social-btn">TELEGRAM</a>
            <a href="https://wa.me/6285860867230" class="social-btn">WHATSAPP</a>
        </div>
    </div>

    <div class="ios-overlay" id="iosOverlay">
        <div class="ios-dialog">
            <div class="ios-content">
                <div class="ios-title" id="iosTitle">Sistem</div>
                <div class="ios-msg" id="iosMsg">Pesan di sini</div>
            </div>
            <button class="ios-btn" onclick="closeIosDialog()">OK</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAXvtrPK-PfSiwUXL6nVFDpqPfuZKMkffU",
            authDomain: "login-auth-37dc9.firebaseapp.com",
            databaseURL: "https://login-auth-37dc9-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "login-auth-37dc9",
            storageBucket: "login-auth-37dc9.firebasestorage.app",
            messagingSenderId: "1075400215838",
            appId: "1:1075400215838:web:1530cfa664c4f6e65e4d0f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        particlesJS('particles-js', {
            "particles": {
                "number": { "value": 80 },
                "color": { "value": "#00ff00" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5 },
                "size": { "value": 3 },
                "line_linked": { "enable": true, "distance": 150, "color": "#00ff00", "opacity": 0.2, "width": 1 },
                "move": { "enable": true, "speed": 2 }
            }
        });

        window.handleLogin = async function() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value;

            if (!u || !p) {
                showIosDialog("Peringatan", "Silakan isi semua kolom input, Tuan!");
                return;
            }

            try {
                const dbRef = ref(db);
                const snapshot = await get(child(dbRef, `users/${u}`));

                if (snapshot.exists()) {
                    const userData = snapshot.val();
                    if (userData.password === p) {
                        if (userData.status === "active") {
                            showIosDialog("Success", "✅ Akses Diterima! Selamat datang kembali.");
                            setTimeout(() => { 
                                window.location.href = 'https://login-by-xeta.vercel.app/'; 
                            }, 2000);
                        } else { 
                            showIosDialog("Akses Ditolak", "akun lu sedang Non-Aktif."); 
                        }
                    } else { 
                        showIosDialog("Gagal Login", "Password yang lu masukin salah total!"); 
                    }
                } else { 
                    showIosDialog("Error", "User tidak ditemukan di database kami."); 
                }
            } catch (e) { 
                showIosDialog("Koneksi Error", "Gagal menghubungkan ke server Firebase."); 
            }
        };

        window.showIosDialog = function(title, msg) {
            document.getElementById('iosTitle').innerText = title;
            document.getElementById('iosMsg').innerText = msg;
            document.getElementById('iosOverlay').style.display = 'flex';
            if(title === "Gagal Login" || title === "Error") {
                const card = document.querySelector('.login-card');
                card.style.animation = "shake 0.2s ease-in-out 0s 2";
                setTimeout(() => { card.style.animation = ""; }, 400);
            }
        }

        window.closeIosDialog = function() {
            document.getElementById('iosOverlay').style.display = 'none';
        }

        window.buyAccess = function() {
            showIosDialog("VIP Access", "Hubungi Admin via Telegram/WhatsApp untuk aktivasi permanen!");
        };
    </script>
</body>
</html>
